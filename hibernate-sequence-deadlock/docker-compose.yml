services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: deadlock_demo
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
    ports:
      - "5432:5432"
    command: >
      postgres
        -c log_min_duration_statement=0
        -c deadlock_timeout=1s
        -c log_lock_waits=on
